<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Org Chart Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Inter, -apple-system, sans-serif;
    font-size: 13px;
    color: #1a1d23;
    background: #f5f6f8;
    padding: 16px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .header h1 {
    font-size: 15px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .bridge-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
    border: 1px solid #e2e8f0;
    background: #fff;
    color: #94a3b8;
    transition: all 0.2s;
    cursor: default;
  }
  .bridge-badge.connected {
    background: #f0fdf4;
    border-color: #bbf7d0;
    color: #16a34a;
  }
  .bridge-dot {
    width: 6px;
    height: 6px;
    border-radius: 3px;
    background: #cbd5e1;
    transition: background 0.2s;
  }
  .bridge-badge.connected .bridge-dot {
    background: #22c55e;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── Textarea ── */
  .section { margin-bottom: 13px; }
  label {
    display: block;
    font-size: 10px;
    font-weight: 700;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 5px;
  }
  textarea {
    width: 100%;
    height: 150px;
    padding: 10px 12px;
    border: 1.5px solid #e2e8f0;
    border-radius: 8px;
    font-family: 'JetBrains Mono', 'Cascadia Code', monospace;
    font-size: 11.5px;
    line-height: 1.6;
    resize: vertical;
    outline: none;
    background: #fff;
    color: #1e293b;
    transition: border-color 0.15s;
  }
  textarea:focus { border-color: #6366f1; }
  .hint { font-size: 10px; color: #94a3b8; margin-top: 4px; }

  /* ── Row layout ── */
  .row { display: flex; gap: 10px; }
  .row .section { flex: 1; }

  /* ── Chips ── */
  .chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    padding: 5px 12px;
    border: 1.5px solid #e2e8f0;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    background: #fff;
    color: #475569;
    transition: all 0.12s;
    user-select: none;
  }
  .chip:hover { border-color: #6366f1; color: #6366f1; }
  .chip.active { background: #6366f1; border-color: #6366f1; color: #fff; }

  /* ── Number inputs ── */
  .num { display: flex; align-items: center; gap: 6px; }
  .num input {
    width: 60px;
    padding: 5px 8px;
    border: 1.5px solid #e2e8f0;
    border-radius: 6px;
    font-size: 12px;
    text-align: center;
    outline: none;
    background: #fff;
    transition: border-color 0.15s;
  }
  .num input:focus { border-color: #6366f1; }
  .num span { font-size: 11px; color: #94a3b8; }

  /* ── Divider ── */
  .divider { height: 1px; background: #e2e8f0; margin: 14px 0; }

  /* ── Buttons ── */
  .btns { display: flex; gap: 8px; }
  button {
    flex: 1;
    padding: 9px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.12s;
    letter-spacing: 0.1px;
  }
  .btn-generate { background: #6366f1; color: #fff; }
  .btn-generate:hover { background: #4f46e5; }
  .btn-generate:active { transform: scale(0.98); }
  .btn-update { background: #fff; color: #374151; border: 1.5px solid #e2e8f0; }
  .btn-update:hover { border-color: #6366f1; color: #6366f1; }
  .btn-clear { flex: 0 0 auto; background: #fff; color: #ef4444; border: 1.5px solid #fca5a5; padding: 9px 16px; }
  .btn-clear:hover { background: #fef2f2; }

  /* ── Status ── */
  #status {
    display: none;
    margin-top: 10px;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 12px;
    align-items: center;
    gap: 6px;
  }
  #status.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; display: flex; }
  #status.error   { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; display: flex; }

  /* ── Bridge info ── */
  .bridge-info {
    margin-top: 10px;
    padding: 10px 12px;
    background: #f8fafc;
    border: 1px dashed #cbd5e1;
    border-radius: 8px;
    font-size: 11px;
    color: #64748b;
    line-height: 1.6;
  }
  .bridge-info code {
    background: #e2e8f0;
    padding: 1px 5px;
    border-radius: 4px;
    font-family: monospace;
    color: #334155;
  }
</style>
</head>
<body>

<div class="header">
  <h1>🌳 Org Chart</h1>
  <div class="bridge-badge" id="bridgeBadge">
    <div class="bridge-dot" id="bridgeDot"></div>
    <span id="bridgeLabel">Bridge off</span>
  </div>
</div>

<div class="section">
  <label>Estrutura hierárquica</label>
  <textarea id="input" placeholder="CEO&#10;- Operações&#10;  - Squad Performance&#10;    - Gestor de Tráfego&#10;    - Analista de Dados&#10;  - Squad Conteúdo&#10;    - Editor&#10;    - Social Media&#10;- Produto&#10;  - Tech Lead&#10;  - Dev Full Stack&#10;- Comercial&#10;  - SDR&#10;  - Closer"></textarea>
  <p class="hint">Recuo + traços para hierarquia. Subtítulo: "Título: Cargo". Ctrl+Enter para gerar.</p>
</div>

<div class="row">
  <div class="section">
    <label>Direção</label>
    <div class="chips">
      <div class="chip active" data-group="direction" data-value="top-down">↓ Top-Down</div>
      <div class="chip" data-group="direction" data-value="left-right">→ Left-Right</div>
    </div>
  </div>
</div>

<div class="row">
  <div class="section">
    <label>Espaço H</label>
    <div class="num">
      <input type="number" id="hSpacing" value="40" min="10" max="200" />
      <span>px</span>
    </div>
  </div>
  <div class="section">
    <label>Espaço V</label>
    <div class="num">
      <input type="number" id="vSpacing" value="60" min="10" max="200" />
      <span>px</span>
    </div>
  </div>
</div>

<div class="divider"></div>

<div class="btns">
  <button class="btn-generate" id="btnGenerate">⚡ Gerar</button>
  <button class="btn-update" id="btnUpdate">🔄 Atualizar</button>
  <button class="btn-clear" id="btnClear">🗑</button>
</div>

<div id="status"></div>

<div class="bridge-info" id="bridgeInfo">
  <strong>Bridge (Claude Code → Figma):</strong><br/>
  1. Inicie o servidor: <code>node bridge/server.js</code><br/>
  2. Envie do Claude Code: <code>node bridge/send.js "CEO\n- Ops"</code>
</div>

<script>
  const BRIDGE = 'http://localhost:4242';
  const state = { direction: 'top-down' };
  let bridgeConnected = false;

  // ── Chips ────────────────────────────────────────────────────────────────
  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const group = chip.dataset.group;
      document.querySelectorAll(`.chip[data-group="${group}"]`).forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      state[group] = chip.dataset.value;
    });
  });

  // ── Config ───────────────────────────────────────────────────────────────
  function getConfig() {
    return {
      direction: state.direction,
      theme: 'light',
      hSpacing: parseInt(document.getElementById('hSpacing').value) || 40,
      vSpacing: parseInt(document.getElementById('vSpacing').value) || 60,
    };
  }

  // ── Status ───────────────────────────────────────────────────────────────
  function showStatus(type, msg) {
    const el = document.getElementById('status');
    el.className = type;
    el.textContent = msg;
    clearTimeout(el._t);
    if (type === 'success') el._t = setTimeout(() => el.style.display = 'none', 4000);
  }

  // ── Buttons ──────────────────────────────────────────────────────────────
  document.getElementById('btnGenerate').addEventListener('click', () => {
    const text = document.getElementById('input').value.trim();
    if (!text) return showStatus('error', 'Digite a estrutura antes de gerar.');
    parent.postMessage({ pluginMessage: { type: 'generate', text, config: getConfig() } }, '*');
  });

  document.getElementById('btnUpdate').addEventListener('click', () => {
    const text = document.getElementById('input').value.trim();
    if (!text) return showStatus('error', 'Digite a estrutura antes de atualizar.');
    parent.postMessage({ pluginMessage: { type: 'update', text, config: getConfig() } }, '*');
  });

  document.getElementById('btnClear').addEventListener('click', () => {
    parent.postMessage({ pluginMessage: { type: 'clear' } }, '*');
  });

  document.getElementById('input').addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === 'Enter') document.getElementById('btnGenerate').click();
  });

  // ── Messages from plugin ─────────────────────────────────────────────────
  window.onmessage = event => {
    const msg = event.data.pluginMessage;
    if (msg) showStatus(msg.type, msg.message);
  };

  // ── Bridge polling ────────────────────────────────────────────────────────
  function updateBridgeUI(connected) {
    if (connected === bridgeConnected) return;
    bridgeConnected = connected;
    const badge = document.getElementById('bridgeBadge');
    const label = document.getElementById('bridgeLabel');
    badge.className = 'bridge-badge' + (connected ? ' connected' : '');
    label.textContent = connected ? 'Bridge on' : 'Bridge off';
  }

  async function pollBridge() {
    try {
      const res = await fetch(`${BRIDGE}/command`, { signal: AbortSignal.timeout(1500) });
      if (!res.ok) { updateBridgeUI(false); return; }
      updateBridgeUI(true);
      const data = await res.json();
      if (data.command) {
        // Consume command
        await fetch(`${BRIDGE}/command`, { method: 'DELETE' });
        // Fill textarea for visibility
        const cmd = data.command;
        if (cmd.text) document.getElementById('input').value = cmd.text;
        // Send to plugin backend
        parent.postMessage({ pluginMessage: cmd }, '*');
        showStatus('success', '⚡ Comando recebido do Claude Code!');
      }
    } catch {
      updateBridgeUI(false);
    }
  }

  // Poll every 2s
  setInterval(pollBridge, 2000);
  pollBridge(); // immediate first check
</script>
</body>
</html>
