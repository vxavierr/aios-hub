id: ciclo-semanal
name: "Ciclo Semanal de Performance"
command: "*ciclo-semanal"
icon: "📅"
description: "Pipeline semanal: normalização de dados → análise de campanhas + otimizações → análise de leads (quando aplicável)"
squad: uhuru-squad

inputs:
  - name: cliente
    description: "Código do cliente (OCP_, ASM_, BDG_, PRODOM_)"
    required: true
  - name: periodo
    description: "Período de referência (ex: semana 1 - fev/2026)"
    required: true
  - name: modo_extracao
    description: "api (automático via *extrair) ou csv (manual via *normalizar). Default: api"
    required: false
    default: "api"
  - name: arquivos_campanhas
    description: "CSVs exportados das plataformas (obrigatório se modo_extracao=csv, ignorado se api)"
    required: false
  - name: arquivo_leads
    description: "CSV de leads do período (apenas OCP_ por enquanto)"
    required: false

leads_status:
  OCP_: ativo
  ASM_: sem geração de leads ainda
  BDG_: em configuração
  PRODOM_: em configuração

steps:

  # ─────────────────────────────────────────
  # BLOCO 0 — EXTRAÇÃO AUTOMÁTICA (opcional)
  # ─────────────────────────────────────────

  - id: extrair
    name: "Extrair dados via API (automático)"
    agent: nova
    task: tasks/nova/extrair.md
    command: "*extrair {cliente} all {periodo}"
    description: >
      Extrai dados direto das APIs do Google Ads e Meta Ads.
      Produz dataset no schema padrão, pronto para *analisar.
      Se a API falhar, token expirar, ou for LinkedIn:
      usar *normalizar com CSV manual como fallback.
    output: "dados_extraidos"
    optional: true
    skip_if: "modo_extracao == 'csv' OU cliente sem IDs cadastrados OU plataforma == linkedin"

  # ─────────────────────────────────────────
  # BLOCO 1 — CAMPANHAS
  # ─────────────────────────────────────────

  - id: normalizar
    name: "Normalizar dados de campanhas (fallback CSV manual)"
    agent: nova
    task: tasks/nova/normalizar-campanhas.md
    command: "*normalizar {cliente} [arquivos_campanhas]"
    condition: "extrair falhou OU modo_extracao == 'csv' OU plataforma == linkedin OU CSVs fornecidos"
    description: >
      Fallback para quando *extrair não está disponível.
      Recebe CSVs brutos exportados das plataformas, padroniza colunas,
      remove linhas inválidas e prepara dataset limpo para análise.
    output: "dados_normalizados"

  - id: analisar
    name: "Análise de campanhas + Otimizações"
    agent: nova
    task: tasks/nova/analisar.md
    command: "*analisar {cliente} {periodo}"
    depends_on: [extrair, normalizar]
    description: >
      Analisa os dados do período (vindos de *extrair ou *normalizar). Se identificar lacunas ou
      ambiguidades nos dados, pergunta antes de continuar.
      Entrega dois blocos distintos:
        1. Análise completa de campanhas (Big Numbers + diagnóstico)
        2. Otimizações propostas (separado da análise)
    behavior:
      - Se dados insuficientes ou ambíguos → PERGUNTAR antes de analisar
      - Nunca inventar métricas ausentes
      - Otimizações ficam em bloco separado — nunca misturado na análise
    output: "analise_campanhas + otimizacoes"

  - id: diagnostico
    name: "Diagnóstico de criativos"
    agent: nova
    task: tasks/nova/diagnostico.md
    command: "*diagnostico {cliente}"
    depends_on: [analisar]
    description: >
      Analisa criativos ativos em todas as plataformas do cliente.
      Classifica como campeão (manter), fadiga (renovar) ou fraco (pausar).
      Recomenda posts para impulsionar e briefings de novos criativos.
    output: "diagnostico_criativos"

  # ─────────────────────────────────────────
  # BLOCO 2 — LEADS (condicional)
  # ─────────────────────────────────────────

  - id: normalizar_leads
    name: "Normalizar dados de leads"
    agent: nova
    task: tasks/nova/normalizar-leads.md
    command: "*normalizar-leads {cliente} [arquivo_leads]"
    depends_on: [normalizar]
    condition: "leads_status[cliente] == 'ativo'"
    description: >
      Recebe o CSV de leads exportado. Padroniza colunas, identifica campos
      relevantes (nome, telefone, CNPJ, empresa, cargo, canal de origem)
      e prepara os dados para qualificação.
    skip_if: "arquivo_leads não fornecido ou cliente sem leads ativos"
    output: "leads_normalizados"

  - id: analisar_leads
    name: "Qualificação e análise de leads"
    agent: nova
    task: tasks/nova/leads.md
    command: "*leads {cliente}"
    depends_on: [normalizar_leads]
    condition: "leads_status[cliente] == 'ativo'"
    description: >
      Qualifica cada lead do período. Pesquisa CNPJ quando disponível,
      avalia fit com o negócio do cliente, classifica como qualificado
      ou não qualificado. Entrega análise completa com veredicto por lead
      e resumo do período.
    behavior:
      - Validar CNPJ via pesquisa quando disponível
      - Classificar fit com o negócio do cliente
      - Veredicto explícito por lead: ✅ Qualificado / ❌ Não qualificado / ⚠️ Inconclusivo
      - Resumo ao final: total qualificados, taxa de qualificação, padrões identificados
    skip_if: "leads_status[cliente] != 'ativo'"
    output: "analise_leads"

flow_diagram: |
  BLOCO 0 — EXTRAÇÃO (automático, opcional)
  ────────────────────────────────────
  @nova *extrair {cliente} all {periodo}
       ↓ (se falhar ou LinkedIn → CSV manual)

  BLOCO 1 — CAMPANHAS
  ────────────────────────────────────
  @nova *normalizar {cliente} [csvs]  (fallback se *extrair indisponível)
       ↓
  @nova *analisar {cliente} {periodo}
       → se dados incompletos: PERGUNTA PRIMEIRO
       → output: Análise + Otimizações (blocos separados)
       ↓
  @nova *diagnostico {cliente}
       → output: Criativos classificados (campeão/fadiga/fraco) + ações

  BLOCO 2 — LEADS (apenas OCP_ ativo)
  ────────────────────────────────────
  @nova *normalizar-leads {cliente} [csv]
       ↓
  @nova *leads {cliente}
       → pesquisa CNPJ + qualificação por fit
       → output: leads qualificados / não qualificados + análise

notes:
  - "Leads ativos apenas para OCP_ (Ocupacional). ASM_ sem leads. BDG_ e PRODOM_ em configuração."
  - "Agente DEVE perguntar se dados de campanhas estiverem incompletos ou ambíguos — nunca inventar."
  - "Otimizações propostas ficam sempre em bloco separado da análise."
  - "Todos os outputs são markdown formatado — sem integração com Notion ou APIs externas."
