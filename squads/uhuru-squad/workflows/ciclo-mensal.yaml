id: ciclo-mensal
name: "Ciclo Mensal Completo"
command: "*ciclo-mensal"
icon: "🔄"
description: "Pipeline de performance do mês: análise → insights → relatório → próximo ciclo"
squad: uhuru-squad

inputs:
  - name: cliente
    description: "Código do cliente (ou 'all' para todos)"
    required: true
  - name: mes
    description: "Mês de referência (ex: jan/2026)"
    required: true

steps:
  - id: extracao
    name: "Extração de dados"
    agent: nova
    task: tasks/nova/extrair.md
    command: "*extrair {cliente} all"
    description: "Puxar dados completos do mês de todas as plataformas"
    output: "dados_extraidos"

  - id: analise
    name: "Big Numbers & Análise de Campanhas"
    agent: nova
    task: tasks/nova/analisar.md
    command: "*analisar {cliente} {mes}"
    depends_on: [extracao]
    description: "Big Numbers completo + análise profunda de campanhas + otimizações propostas (bloco separado)"
    output: "big_numbers + otimizacoes"

  - id: diagnostico
    name: "Diagnóstico de Criativos"
    agent: nova
    task: tasks/nova/diagnostico.md
    command: "*diagnostico {cliente}"
    depends_on: [analise]
    description: "Classificar criativos (campeão/fadiga/fraco) + assets Google + termos de busca"
    output: "diagnostico_criativos"

  - id: normalizar_leads
    name: "Normalizar dados de leads"
    agent: nova
    task: tasks/nova/normalizar-leads.md
    command: "*normalizar-leads {cliente} [arquivo_leads]"
    depends_on: [extracao]
    condition: "leads_status[cliente] == 'ativo'"
    description: "Normalizar CSV de leads do CRM antes da qualificação"
    output: "leads_normalizados"
    optional: true

  - id: leads
    name: "Qualificação e Análise de Leads"
    agent: nova
    task: tasks/nova/leads.md
    command: "*leads {cliente}"
    depends_on: [normalizar_leads]
    condition: "leads_status[cliente] == 'ativo'"
    description: "Qualificar leads por fit de negócio e análise de CNPJ"
    output: "analise_leads"

  - id: insights
    name: "Compilar Insights"
    agent: sage
    task: tasks/sage/insights.md
    command: "*insights {cliente} {mes}"
    depends_on: [analise, diagnostico, leads]
    description: "Transformar dados em aprendizados e recomendações acionáveis"
    output: "insights"

  - id: forecast
    name: "Forecast & Fechamento"
    agent: finn
    task: tasks/finn/forecast.md
    command: "*forecast {cliente} {mes}"
    depends_on: [analise]
    description: "Fechar budget do mês e projetar o próximo"
    output: "forecast"

  - id: planejamento
    name: "Plano de Mídia"
    agent: flux
    task: tasks/flux/planejar.md
    command: "*planejar {cliente} {proximo_mes}"
    depends_on: [insights, forecast]
    description: "Definir plano de mídia do próximo mês com base nos insights"
    output: "plano_midia"

  - id: relatorio
    name: "Relatório de Resultados"
    agent: sage
    task: tasks/sage/relatorio.md
    command: "*relatorio {cliente} {mes}"
    depends_on: [insights, planejamento]
    description: "Gerar relatório completo do mês"
    output: "relatorio"

  - id: revisao
    name: "Revisão de Objetivos"
    agent: flux
    task: tasks/flux/revisar.md
    command: "*revisar {cliente}"
    depends_on: [analise]
    description: "Comparar metas vs. realizado e definir objetivos do próximo ciclo"
    output: "revisao_objetivos"

  - id: apresentacao
    name: "Apresentação ao Cliente"
    agent: sage
    task: tasks/sage/apresentar.md
    command: "*apresentar {cliente}"
    depends_on: [relatorio]
    description: "Preparar e realizar apresentação mensal ao cliente"
    output: "apresentacao"

  - id: financeiro
    name: "Fechamento Financeiro"
    agent: finn
    task: tasks/finn/financeiro.md
    command: "*financeiro {mes}"
    depends_on: [forecast]
    description: "Consolidar investimentos, NFs e enviar fechamento ao financeiro"
    output: "fechamento_financeiro"

  - id: alocacao
    name: "Alocar Budget do Próximo Mês"
    agent: finn
    task: tasks/finn/alocar.md
    command: "*alocar {cliente}"
    depends_on: [planejamento]
    description: "Configurar budget nas plataformas conforme plano de mídia aprovado"
    output: "budget_configurado"

leads_status:
  OCP_: ativo
  ASM_: sem geração de leads ainda
  BDG_: em configuração
  PRODOM_: em configuração

flow_diagram: |
  @nova *extrair
       ↓
  @nova *analisar ──────────────── @nova *normalizar-leads (se ativo)
       ↓                                    ↓
  @nova *diagnostico                 @nova *leads
       ↓                                    ↓
  @sage *insights ◄──────────────────────────┘
  @finn *forecast
  @flux *revisar
       ↓
  @flux *planejar
       ↓
  @sage *relatorio ──── @finn *financeiro
       ↓
  @sage *apresentar ─── @finn *alocar
